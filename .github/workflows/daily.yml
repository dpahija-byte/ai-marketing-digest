name: Daily AI Marketing Digest

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore digest database
        uses: actions/cache@v4
        with:
          path: data/digest.sqlite3
          key: digest-db-${{ github.run_id }}
          restore-keys: |
            digest-db-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'auto' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-3-5-haiku-latest' }}
          USE_LLM_RANKING: ${{ vars.USE_LLM_RANKING || 'false' }}
          EMAIL_ENABLED: ${{ vars.EMAIL_ENABLED || 'false' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_TLS: ${{ vars.SMTP_TLS || 'true' }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          TELEGRAM_ENABLED: ${{ vars.TELEGRAM_ENABLED || 'false' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m ai_marketing_digest run

      - name: Upload digest output
        uses: actions/upload-artifact@v4
        with:
          name: ai-marketing-digest-output
          path: |
            output/*.md
            data/digest.sqlite3
          if-no-files-found: warn
