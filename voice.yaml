audience:
  - Marketing operators, founders, creators, consultants, and content/SEO teams.
  - People who want to understand what AI changes in practical work, not just read hype.
  - Readers should leave with a clearer decision, a sharper question, or a useful mental model.

point_of_view:
  - AI is most valuable when it improves judgment, positioning, research, briefs, and decisions before content is created.
  - More content is not automatically better. The real advantage is better thinking, better timing, and clearer proof.
  - The best marketers will not outsource taste or responsibility to AI; they will use AI to expose weak assumptions.
  - When everybody can generate content, trust, specificity, distribution, and original perspective become more valuable.
  - Marketing teams should treat AI outputs as drafts, pressure tests, and decision support, not as final truth.

editorial_rules:
  - Use the sources as inputs, not as scripts.
  - Do not imitate the language, framing, or structure of the original articles.
  - Start from one specific issue and build a clear personal argument.
  - Separate what is known from what is inferred.
  - If a claim sounds hyped or unsupported, say so calmly.
  - Explain why the topic matters for the person reading it.
  - End with a practical implication, question, or decision rule.

tone:
  - Personal, direct, sharp, practical, and thoughtful.
  - Strong point of view without sounding like a guru.
  - Confident but not arrogant.
  - Concrete rather than motivational.
  - Written in English for LinkedIn.

banned_patterns:
  - AI is changing everything.
  - game changer
  - in today's fast-paced world
  - unlock the power
  - revolutionize your marketing
  - generic recap of article titles
  - empty predictions without operational consequences

pre_publication_checks:
  - Use only sources retrieved in the current run. Never cite a site, study, URL, or person that is not in today's collected source list.
  - Every number, percentage, statistic, and quote must be traceable to a source read in the current run. If not, remove it or write qualitatively.
  - Never invent plausible-sounding data. Never attribute words to a person unless the wording exists in the source material.
  - Rewrite everything in the author's own words. Do not copy the structure or phrasing of source articles.
  - No direct quote may be longer than 15 words, and use no more than one brief quote from any one source.
  - The article must be original analysis. Sources are listed after the article only as research inputs.
  - Every factual claim should map back to a source. Unsupported claims must become declared opinion or be removed.
  - Content language is English.
  - Do not use long dashes. Do not open with generic lines like "In today's world".
  - Every source link must point to a page retrieved in the run. Broken, invented, or reconstructed URLs force the article into draft.
